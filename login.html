<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPMart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Montserrat', sans-serif;
        }
        body,
        html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #310a26;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .main-container {
            width: 200pc;
            max-width: 1110pt;
            height: 680px;
            background: #ffffff;
            border-radius: 40px;
            display: flex;
            overflow: hidden;   
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }
        .form-container {
            width: 28% !important;
            padding: 40px;
            align-items: center;
            position: relative;
            justify-content: space-around;
            background: #f8f8f3;
        }
        .forms-slider {
            display: flex;
            width: 200%;
            height: 100%;
            transition: transform 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .form-section {
            width: 50%; 
            height: 100%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        .slide-active {
            transform: translateX(-50%);
        }
        .switch-btn {
            background: none;
            border: none;
            color: rgb(0, 0, 0);
            font-size: 0.95rem;
            font-weight: 700;
            text-decoration: underline;
            cursor: pointer;
        }
        .input-group input {
            width: 100%;
            padding: 12px 20px;
            margin: 10px 0;
            border: 1px solid #333;
            border-radius: 25px;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #1a1a2e;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        .visual-container {
            width: 80%;
            background: radial-gradient(at top left, #dfe378, transparent),
                radial-gradient(at bottom right, #9a0000, transparent),
                radial-gradient(at center, #f8f8f3, #310a26);
            color: white;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .top-nav {
            position: absolute;
            top: 40px;
            right: 50px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .nav-link {
            color: white;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            opacity: 0.8;
            transition: 0.3s;
        }
        .nav-link:hover {
            opacity: 1;
        }
        .content-row {
            display: flex;
            align-items: center;
            gap: 50px;
            width: 100%;
            max-width: 800px;
        }
        .welcome-text {
            flex: 1;
            text-align: left;
        }
        .welcome-text h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 10px;
            left: 90px;
            line-height: 1;
        }
        .welcome-text p {
            font-size: 1.1rem;
            line-height: 1.4;
            margin-bottom: 40px;
            max-width: 300px;
        }
        .not-member {
            font-size: 0.95rem;
            font-weight: 500;
        }
        .not-member a {
            color: white;
            font-weight: 700;
        }
        .cart-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
        }
        .cart-image {
            width: 100%;
            max-width: 350px;
            scale: 1.3;
            filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.2));
        }
        .form-footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
            margin-top: 20px;
        }
        .remeber-me {
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .forgot-link {
            font-weight: 500;
            color: #1a1a2e;
            text-decoration: none;
        }
        .logo-image {
            width: 100%;
            height: 50px;
            scale: 2.3;
        }
        .brand {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>
    <div class="main-container">
        <div class="form-container">
            <div class="forms-slider" id="formsSlider">
                <div class="form-section">
                    <div class="brand">
                        <img src="logo.png" class="logo-image" alt="UPMart Logo">
                    </div>

                    <div class="input-group">
                        <input type="text" placeholder="Name">
                        <input type="email" placeholder="UP Email">
                        <input type="password" placeholder="Password">
                    </div>
                    <button class="login-btn">LOGIN</button>    

                    <div class="form-footer">
                        <label class="remember-me">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>
                </div>

                <div class="form-section">
                    <div class="brand">
                        <img src="logo.png" class="logo-image" alt="UPMart Logo">
                    </div>

                    <div class="input-group">
                        <input type="text" placeholder="Full Name">
                        <input type="email" placeholder="UP Email">
                        <input type="password" placeholder="Create Password">
                    </div>
                    <button class="login-btn">SIGN UP</button>

                    <p style="color: #333; font-size: 1rem; margin-top: 20px;">
                        Already a member? <button class="switch-btn" onclick="toggleForm()">Login</button>
                    </p>
                </div>

            </div>
        </div>

        <div class="visual-container">
            <nav class="top-nav">
                <a href="about.html" class="nav-link">ABOUT</a>
                <a href="contact.html" class="nav-link">CONTACT</a>
                <a href="#  " class="nav-link" style="opacity: 1; border: 1px solid white; padding: 4px 12px; border-radius: 4px;">SIGN UP</a>
            </nav>

            <div class="content-row">
                <div class="welcome-text">
                    <h1>Welcome.</h1>
                    <p>Ready to elevate your business? Join the UPMart today.</p>
                    <p class="not-member">
                        Not a member? <button class="switch-btn" onclick="toggleForm()">Sign up now</button>
                    </p>
                </div>
                <div class="cart-wrapper">
                    <img src="cart-icon.png" alt="Cart" class="cart-image">
                </div>
            </div>
        </div>

    </div>

    <script>
        function toggleForm() {
            const slider = document.getElementById('formsSlider');
            slider.classList.toggle('slide-active');
        }
    </script>
</body>
</html>
